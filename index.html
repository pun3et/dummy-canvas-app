<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Canvas App - Message Receiver</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #f4f6f9; color: #333; }
        h1 { color: #0070d2; margin-top: 0; }
        h2 { color: #16325c; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .status-box { padding: 15px; border-radius: 6px; margin: 15px 0; font-weight: bold; text-align: center; }
        .status-waiting { background: #fff4ce; color: #b76e00; border: 1px solid #ffd966; }
        .status-received { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message-card { background: #e3f2fd; border-left: 4px solid #0070d2; padding: 15px; margin: 10px 0; border-radius: 4px; }
        .message-card.latest { background: #fff3cd; border-left-color: #ffc107; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 6px; white-space: pre-wrap; word-wrap: break-word; font-size: 13px; }
        .counter { display: inline-block; background: #0070d2; color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        button { background: #0070d2; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 5px; }
        .clear-btn { background: #c23934; }
        .send-btn { background: #2e844a; }
        .info-row { margin: 5px 0; font-size: 14px; word-break: break-all; }
        .log-section { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 6px; border: 1px solid #dee2e6; }
    </style>
    
    <!-- Canvas SDK -->
    <script src="https://ciscosales--dev.sandbox.my.salesforce.com/canvas/sdk/js/60.0/canvas-all.js"></script>
</head>
<body>
    <div class="container">
        <h1>📥 Canvas App - SDK Receiver</h1>
        <p>Using Canvas SDK for secure cross-origin messaging.</p>
        
        <div class="info-row"><strong>SDK Status:</strong> <span id="sdkStatus">Loading...</span></div>
        <div class="info-row"><strong>Subscription:</strong> <span id="subStatus">Not subscribed</span></div>
        <div class="info-row"><strong>Page Loaded:</strong> <span id="loadTime"></span></div>
        
        <div id="statusBox" class="status-box status-waiting">⏳ Waiting for messages...</div>
        
        <div style="margin: 20px 0;">
            <span class="counter" id="messageCounter">0 received</span>
            <button class="send-btn" onclick="sendBackToSalesforce()">📤 Send Back to SFDC</button>
            <button class="clear-btn" onclick="clearMessages()">🗑️ Clear</button>
        </div>
        
        <div id="latestMessageContainer"></div>
        
        <h2>📜 Message History</h2>
        <div id="messageHistory"><p style="color:#888;">No messages yet.</p></div>
        
        <div class="log-section">
            <h2>🔍 Debug Log</h2>
            <pre id="debugLog" style="max-height:300px; overflow-y:auto;"></pre>
        </div>
    </div>

    <script>
        let messageCount = 0;
        let messageHistory = [];
        
        document.getElementById('loadTime').textContent = new Date().toLocaleString();
        
        function log(msg) {
            const logEl = document.getElementById('debugLog');
            const time = new Date().toLocaleTimeString();
            logEl.textContent = `[${time}] ${msg}\n` + logEl.textContent;
            console.log(`[${time}] ${msg}`);
        }
        
        function updateStatus(received) {
            const box = document.getElementById('statusBox');
            if (received) {
                box.className = 'status-box status-received';
                box.textContent = '✅ Connected! Receiving messages.';
            }
        }
        
        function updateCounter() {
            document.getElementById('messageCounter').textContent = messageCount + ' received';
        }
        
        function clearMessages() {
            messageCount = 0;
            messageHistory = [];
            document.getElementById('latestMessageContainer').innerHTML = '';
            document.getElementById('messageHistory').innerHTML = '<p style="color:#888;">Cleared.</p>';
            updateCounter();
        }
        
        function renderLatest(data) {
            const container = document.getElementById('latestMessageContainer');
            container.innerHTML = `
                <h2>🎯 Latest Message</h2>
                <div class="message-card latest">
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>`;
        }
        
        function renderHistory() {
            const el = document.getElementById('messageHistory');
            if (messageHistory.length === 0) {
                el.innerHTML = '<p style="color:#888;">No messages.</p>';
                return;
            }
            el.innerHTML = messageHistory.map((msg, idx) => `
                <div class="message-card">
                    <div style="font-size:12px;color:#666;">#${messageHistory.length - idx} | ${msg.time}</div>
                    <pre>${JSON.stringify(msg.data, null, 2)}</pre>
                </div>`).join('');
        }
        
        function processMessage(data) {
            messageCount++;
            log('✅ Message #' + messageCount + ' processed');
            updateStatus(true);
            updateCounter();
            renderLatest(data);
            messageHistory.unshift({ time: new Date().toLocaleTimeString(), data: data });
            renderHistory();
        }
        
        function sendBackToSalesforce() {
            if (!window.Sfdc || !window.Sfdc.canvas || !window.Sfdc.canvas.client) {
                log('❌ Canvas SDK not loaded');
                return;
            }
            
            const message = {
                source: 'GitHub Canvas App',
                text: 'Hello from Canvas!',
                timestamp: new Date().toISOString(),
                random: Math.random().toString(36).substring(7)
            };
            
            try {
                window.Sfdc.canvas.client.publish(null, {
                    name: 'canvas.messageFromChild',
                    payload: message
                });
                log('📤 Sent to SFDC via Canvas SDK');
            } catch (e) {
                log('❌ Send error: ' + e.message);
            }
        }
        
        // ==============================================
        // INITIALIZE CANVAS SDK
        // ==============================================
        function initSDK() {
            if (typeof Sfdc === 'undefined' || !Sfdc.canvas) {
                log('⏳ Waiting for Canvas SDK...');
                setTimeout(initSDK, 500);
                return;
            }
            
            log('✅ Canvas SDK detected');
            document.getElementById('sdkStatus').textContent = '✅ Loaded';
            
            Sfdc.canvas(function() {
                log('✅ Canvas SDK ready');
                
                // Subscribe to messages from Salesforce parent
                Sfdc.canvas.client.subscribe(null, [{
                    name: 'sfdc.canvasMessage',
                    onData: function(event) {
                        log('📨 Received via Canvas SDK!');
                        log('   Data: ' + JSON.stringify(event).substring(0, 100));
                        processMessage(event);
                    }
                }]);
                
                document.getElementById('subStatus').textContent = '✅ Subscribed';
                log('✅ Subscribed to "sfdc.canvasMessage"');
            });
        }
        
        // Also keep the postMessage listener as fallback
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'SFDC_MESSAGE') {
                log('📨 Received via postMessage fallback');
                processMessage(event.data.payload);
            }
        }, false);
        
        log('🚀 Page loaded, initializing...');
        initSDK();
    </script>
</body>
</html>
