<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Canvas App</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #f4f6f9; }
        h1 { color: #0070d2; margin-top: 0; }
        h2 { color: #16325c; }
        .container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .status-box { padding: 15px; border-radius: 6px; margin: 15px 0; font-weight: bold; text-align: center; }
        .status-waiting { background: #fff4ce; color: #b76e00; }
        .status-received { background: #d4edda; color: #155724; }
        .message-card { background: #e3f2fd; border-left: 4px solid #0070d2; padding: 15px; margin: 10px 0; border-radius: 4px; }
        .message-card.latest { background: #fff3cd; border-left-color: #ffc107; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 6px; white-space: pre-wrap; word-wrap: break-word; font-size: 13px; }
        .counter { display: inline-block; background: #0070d2; color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        button { background: #0070d2; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 5px; }
        .clear-btn { background: #c23934; }
        .send-btn { background: #2e844a; }
        .info-row { margin: 5px 0; font-size: 14px; word-break: break-all; }
        .log-section { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 6px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 Canvas App - Iframe Driven</h1>
        
        <div class="info-row"><strong>Page Loaded:</strong> <span id="loadTime"></span></div>
        <div class="info-row"><strong>HELLOs sent:</strong> <span id="helloCount">0</span></div>
        <div class="info-row"><strong>Connected:</strong> <span id="connStatus">No</span></div>
        
        <div id="statusBox" class="status-box status-waiting">⏳ Sending HELLO to Salesforce...</div>
        
        <div style="margin: 20px 0;">
            <span class="counter" id="messageCounter">0 received</span>
            <button class="send-btn" onclick="sendBackToSalesforce()">📤 Send Back to SFDC</button>
            <button class="clear-btn" onclick="clearMessages()">🗑️ Clear</button>
        </div>
        
        <div id="latestMessageContainer"></div>
        
        <h2>📜 Message History</h2>
        <div id="messageHistory"><p style="color:#888;">No messages yet.</p></div>
        
        <div class="log-section">
            <h2>🔍 Debug Log</h2>
            <pre id="debugLog" style="max-height:400px; overflow-y:auto;"></pre>
        </div>
    </div>

    <script>
        let messageCount = 0;
        let helloCount = 0;
        let messageHistory = [];
        let connected = false;
        let helloInterval = null;
        
        document.getElementById('loadTime').textContent = new Date().toLocaleString();
        
        function log(msg) {
            const logEl = document.getElementById('debugLog');
            const time = new Date().toLocaleTimeString();
            logEl.textContent = `[${time}] ${msg}\n` + logEl.textContent;
            console.log(`[Canvas iframe] ${msg}`);
        }
        
        function updateConnected() {
            connected = true;
            document.getElementById('connStatus').textContent = 'Yes ✅';
            const box = document.getElementById('statusBox');
            box.className = 'status-box status-received';
            box.textContent = '✅ Connected to Salesforce!';
            
            if (helloInterval) {
                clearInterval(helloInterval);
                helloInterval = null;
                log('🛑 Stopped HELLO broadcast (now connected)');
            }
        }
        
        function clearMessages() {
            messageCount = 0;
            messageHistory = [];
            document.getElementById('latestMessageContainer').innerHTML = '';
            document.getElementById('messageHistory').innerHTML = '<p style="color:#888;">Cleared.</p>';
            document.getElementById('messageCounter').textContent = '0 received';
        }
        
        function processMessage(data) {
            messageCount++;
            log('✅ Message #' + messageCount + ' received');
            document.getElementById('messageCounter').textContent = messageCount + ' received';
            
            document.getElementById('latestMessageContainer').innerHTML = `
                <h2>🎯 Latest Message</h2>
                <div class="message-card latest">
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>`;
            
            messageHistory.unshift({ time: new Date().toLocaleTimeString(), data: data });
            
            const historyEl = document.getElementById('messageHistory');
            historyEl.innerHTML = messageHistory.map((msg, idx) => `
                <div class="message-card">
                    <div style="font-size:12px;color:#666;">#${messageHistory.length - idx} | ${msg.time}</div>
                    <pre>${JSON.stringify(msg.data, null, 2)}</pre>
                </div>`).join('');
        }
        
        // ==============================================
        // SEND HELLO TO PARENT - Sprays to all ancestors
        // ==============================================
        function sendHelloToAllAncestors() {
            if (connected) return;
            
            helloCount++;
            document.getElementById('helloCount').textContent = helloCount;
            
            const helloMessage = {
                type: 'CANVAS_HELLO',
                source: 'GitHub Canvas iframe',
                helloNumber: helloCount,
                timestamp: new Date().toISOString()
            };
            
            // Strategy 1: Send to direct parent
            try {
                window.parent.postMessage(helloMessage, '*');
                log(`👋 HELLO #${helloCount} sent to window.parent`);
            } catch (e) {
                log(`❌ parent failed: ${e.message}`);
            }
            
            Strategy 2: Send to top
            try {
                if (window.top !== window.parent) {
                    window.top.postMessage(helloMessage, '*');
                    log(`👋 HELLO #${helloCount} sent to window.top`);
                }
            } catch (e) {
                log(`❌ top failed: ${e.message}`);
            }
            
            // Strategy 3: Walk up the parent chain
            // try {
            //     let w = window.parent;
            //     let depth = 0;
            //     while (w && w !== window.top && depth < 5) {
            //         try {
            //             w.postMessage({...helloMessage, ancestorDepth: depth}, '*');
            //             log(`👋 HELLO sent to ancestor depth ${depth}`);
            //         } catch(e) {}
            //         w = w.parent;
            //         depth++;
            //     }
            // } catch(e) {}
        }
        
        // ==============================================
        // SEND BACK TO SALESFORCE
        // ==============================================
        function sendBackToSalesforce() {
            const message = {
                type: 'CANVAS_TO_SFDC',
                source: 'GitHub Canvas iframe',
                text: 'Manual message from iframe!',
                timestamp: new Date().toISOString(),
                random: Math.random().toString(36).substring(7)
            };
            
            try {
                window.parent.postMessage(message, '*');
                window.top.postMessage(message, '*'); // belt + suspenders
                log('📤 Sent to parent and top');
            } catch (e) {
                log('❌ Send failed: ' + e.message);
            }
        }
        
        // ==============================================
        // LISTEN FOR MESSAGES
        // ==============================================
        window.addEventListener('message', function(event) {
            // Filter noise (Lightning sends lots of internal messages)
            if (!event.data || typeof event.data !== 'object') return;
            
            // Only log relevant messages
            const dataStr = JSON.stringify(event.data).substring(0, 100);
            
            // Ignore Salesforce internal messages
            if (dataStr.includes('aura:') || dataStr.includes('lwc:') || dataStr.includes('lightning')) {
                return; // skip noise
            }
            
            log(`📨 Message from "${event.origin}": ${dataStr}`);
            
            // Process Salesforce messages
            if (event.data.type === 'SFDC_HELLO_ACK' || 
                event.data.type === 'SFDC_TO_CANVAS' || 
                event.data.type === 'SFDC_MESSAGE') {
                
                if (!connected) {
                    log('🎉 Connection established!');
                    updateConnected();
                }
                
                processMessage(event.data);
            }
        }, false);
        
        log('🚀 Page loaded. Starting HELLO broadcast...');
        
        // Start handshake immediately and retry every 1.5 seconds
        sendHelloToAllAncestors();
        helloInterval = setInterval(sendHelloToAllAncestors, 1500);
        
        // Stop after 30 seconds to avoid spam
        setTimeout(function() {
            if (helloInterval) {
                clearInterval(helloInterval);
                helloInterval = null;
                log('🛑 HELLO broadcast timeout (30s). Click button to retry.');
            }
        }, 30000);
    </script>
</body>
</html>
